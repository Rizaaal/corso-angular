<div>
  <h2>{{name}}</h2>
  <p>
    <span class="secondary">{{tags.join(", ")}}</span> | 
    <span class="secondary">{{available ? "disponibile" : "Non disponibile"}}</span>
  </p>
  <img [src]="imageUrl" alt="product_image">
  <p>Brand: <span>{{brand}}</span></p>
  <p>Price: <span><b>{{finalPrice()}}</b> €</span></p>
  <button (click)="compra()">Acquista</button>
</div>
<input type="text" [(ngModel)]="name">
<select name="tags" id="tags-select">
  @for (tag of tags; track $index) {
    <option value="{{tag}}">{{tag}}</option>
  }
</select>
